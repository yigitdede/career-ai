# CareerTalent AI — prod nginx
# landing/ statik + /panel → Laravel (artisan veya php-fpm) + /api → FastAPI

upstream careertalent_api {
    server api:8000;
}

upstream careertalent_web {
    server web:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 12m;

    # ── FastAPI ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://careertalent_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://careertalent_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Vite assets (export edilmiş Blade linkleri) ─────────
    location /build/ {
        alias /var/www/frontend/public/build/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Laravel panel (proxy — dev: artisan serve, prod: php-fpm) ─
    location /panel {
        proxy_pass http://careertalent_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Marketing statik (landing/ — scripts/build-landing.sh) ─
    root /var/www/landing;
    index index.html;

    location = /ozellikler {
        try_files /ozellikler/index.html =404;
    }

    location = /nasil-calisir {
        try_files /nasil-calisir/index.html =404;
    }

    location = /bootcamp {
        try_files /bootcamp/index.html =404;
    }

    location = / {
        try_files /index.html =404;
    }
}
