services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./data:/app/data
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    image: php:8.3-cli
    working_dir: /var/www
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/var/www
    environment:
      CAREERTALENT_API_URL: http://api:8000
      APP_URL: http://localhost:8080
    depends_on:
      - api
    command: php artisan serve --host=0.0.0.0 --port=8080

  worker:
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./data:/app/data
    depends_on:
      - db
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: careertalent
      POSTGRES_PASSWORD: careertalent
      POSTGRES_DB: careertalent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Prod giriş: landing/ statik + panel proxy + API proxy
  # Önce: bash scripts/build-landing.sh
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/careertalent.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing:/var/www/landing:ro
      - ./frontend/public:/var/www/frontend/public:ro
    depends_on:
      - web
      - api
    profiles:
      - prod

volumes:
  pgdata:
